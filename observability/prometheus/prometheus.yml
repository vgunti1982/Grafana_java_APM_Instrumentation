global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["host.docker.internal:9090"]

  - job_name: java-apps
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8081
          - host.docker.internal:8082
          - host.docker.internal:8083

  - job_name: tempo
    static_configs:
      - targets: ["host.docker.internal:3200"]

